name: Continuity Kernel Guardrails

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  continuity-kernel-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile backend modules
        run: python -m compileall backend/app backend/scripts

      - name: Run architecture guardrail tests
        run: python -m unittest discover -s backend/tests/architecture -p "test_*.py" -v

      - name: Run contract guardrail tests
        run: python -m unittest discover -s backend/tests/contracts -p "test_*.py" -v

  continuity-kernel-runtime-route-test-env:
    runs-on: ubuntu-latest
    env:
      CONTINUITY_KERNEL_RUNTIME_TEST_ENFORCE_NO_SKIPS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run focused Phase 6I runtime route test (verified by Phase 6J)
        run: python -m unittest backend.tests.contracts.test_continuity_kernel_phase6i_runtime_route_verification -v

      - name: Run Phase 6L runtime no-skip enforcement test
        run: python -m unittest backend.tests.contracts.test_continuity_kernel_phase6l_runtime_no_skip_enforcement -v
