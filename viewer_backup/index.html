<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Family Tree: Tomb of Light</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="slideshow" id="slideshow">
      <img id="slideImg" src="images/malik.jpg" alt="Malik" class="zoom-in" />
      <div id="branch-buttons" class="branch-options">
        <button id="btnJulian">Julian</button>
        <button id="btnMalik">Malik</button>
        <button id="btnSelah">Selah</button>
      </div>
    </div>

    <div class="controls">
      <button onclick="prevSlide()">Prev</button>
      <button onclick="togglePlay()" id="playPauseBtn">Pause</button>
      <button onclick="nextSlide()">Next</button>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
